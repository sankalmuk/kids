<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Zigzaw</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d078;
    --gold-dim: #8a6e2a;
    --deep: #0d0a1a;
    --panel: #13102a;
    --panel2: #1c1838;
    --border: #2e2560;
    --text: #e8d8a0;
    --text-dim: #9080a0;
    --accent: #6a2e8a;
    --accent2: #3a1a5a;
    --success: #4caf90;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    font-family: 'Lato', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, #2a1040 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #1a0a2a 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(100,70,180,0.03) 60px, rgba(100,70,180,0.03) 61px);
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 28px 20px 16px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    margin: 14px auto 0;
    width: 320px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .title-om {
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--gold-light);
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(240,208,120,0.4), 0 2px 0 rgba(0,0,0,0.6);
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 5px;
    color: var(--gold-dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-group label {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--gold-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }

  select, button {
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--text);
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  select:hover, button:hover {
    border-color: var(--gold-dim);
    background: #201c40;
  }
  select:focus { border-color: var(--gold); }

  #imageSelect { max-width: 220px; }

  .btn-primary {
    background: linear-gradient(135deg, #4a2080, #6a2e8a);
    border-color: var(--accent);
    color: #f0d4ff;
    font-family: 'Cinzel', serif;
    letter-spacing: 1.5px;
    font-size: 0.75rem;
    text-transform: uppercase;
    padding: 8px 20px;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #5a2896, #7a3a9e);
    border-color: var(--gold-dim);
    box-shadow: 0 0 14px rgba(130,60,180,0.5);
  }

  .btn-hint {
    background: linear-gradient(135deg, #1a3020, #2a4830);
    border-color: #2a5040;
    color: #80d0a0;
    font-family: 'Cinzel', serif;
    letter-spacing: 1.5px;
    font-size: 0.72rem;
    text-transform: uppercase;
    padding: 8px 16px;
  }
  .btn-hint:hover {
    background: linear-gradient(135deg, #1e3824, #2e5034);
    box-shadow: 0 0 10px rgba(60,200,120,0.3);
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 8px 20px;
    background: rgba(0,0,0,0.2);
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .stat-item span { color: var(--gold); font-weight: 600; }

  /* ── Main layout ── */
  .main-layout {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 200px);
  }

  /* ── Puzzle area ── */
  .puzzle-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
  }

  .board-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  #puzzleBoard {
    position: relative;
    background: #080614;
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow:
      0 0 0 1px rgba(100,70,180,0.2),
      0 8px 40px rgba(0,0,0,0.7),
      inset 0 0 30px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  #puzzleBoard::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(60,40,120,0.15) 39px, rgba(60,40,120,0.15) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(60,40,120,0.15) 39px, rgba(60,40,120,0.15) 40px);
    pointer-events: none;
    z-index: 1;
  }

  .board-slot {
    position: absolute;
    border: 1px dashed rgba(100,70,200,0.25);
    transition: background 0.2s, border-color 0.2s;
    z-index: 2;
  }
  .board-slot.hover-target {
    background: rgba(100,70,200,0.15);
    border-color: rgba(200,160,80,0.5);
  }
  .board-slot.filled { border-color: transparent; }

  /* ── Pieces tray ── */
  .tray-section {
    width: 220px;
    border-left: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 10px;
    gap: 12px;
  }
  .tray-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--gold-dim);
    text-transform: uppercase;
  }
  #pieceTray {
    width: 100%;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-content: flex-start;
    padding: 6px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 200px;
  }
  #pieceTray::-webkit-scrollbar { width: 5px; }
  #pieceTray::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Pieces ── */
  .puzzle-piece {
    position: absolute;
    cursor: grab;
    transition: box-shadow 0.15s, transform 0.1s;
    border-radius: 3px;
    will-change: transform;
    z-index: 10;
    user-select: none;
  }
  .puzzle-piece:hover {
    box-shadow: 0 4px 20px rgba(200,160,80,0.5);
    z-index: 100;
  }
  .puzzle-piece.dragging {
    cursor: grabbing;
    box-shadow: 0 8px 32px rgba(200,160,80,0.6), 0 0 0 2px var(--gold);
    z-index: 9999;
    transform: scale(1.06) rotate(1deg);
  }
  .puzzle-piece.placed {
    cursor: default;
    box-shadow: 0 0 8px rgba(76,175,144,0.4);
    pointer-events: none;
    z-index: 3;
  }
  .puzzle-piece.hint-flash {
    animation: hintFlash 0.6s ease;
  }
  @keyframes hintFlash {
    0%,100% { box-shadow: 0 0 0 2px transparent; }
    50% { box-shadow: 0 0 0 3px var(--gold-light), 0 0 16px var(--gold); }
  }

  /* In-tray pieces wrapper */
  .tray-piece-wrap {
    position: relative;
    flex-shrink: 0;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(100,70,180,0.3);
    transition: border-color 0.2s;
  }
  .tray-piece-wrap:hover { border-color: var(--gold-dim); }
  .tray-piece-wrap canvas {
    display: block;
    cursor: grab;
  }
  .tray-piece-wrap canvas:active { cursor: grabbing; }

  /* ── Completion overlay ── */
  #completionOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,3,15,0.85);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(6px);
  }
  #completionOverlay.show { display: flex; }
  .completion-box {
    background: var(--panel2);
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(200,160,60,0.3), 0 0 120px rgba(100,60,180,0.2);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .completion-om { font-size: 3rem; margin-bottom: 8px; }
  .completion-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(240,208,120,0.5);
    margin-bottom: 8px;
  }
  .completion-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-dim);
    letter-spacing: 3px;
    margin-bottom: 24px;
  }
  .completion-stats {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    line-height: 2;
  }
  .completion-stats span { color: var(--gold); }

  /* ── Placeholder message ── */
  #placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
    padding: 60px 20px;
    text-align: center;
  }
  .placeholder-om { font-size: 3rem; opacity: 0.3; }
  .placeholder-text {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    line-height: 1.8;
    opacity: 0.6;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  @media (max-width: 700px) {
    .main-layout { flex-direction: column; }
    .tray-section { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    #pieceTray { max-height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="title-om">ॐ</div>
  <h1>Krishna Zigzaw</h1>
  <div class="subtitle">Sacred Puzzle of the Divine</div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Image</label>
    <select id="imageSelect"><option value="">— Choose Image —</option></select>
  </div>
  <div class="ctrl-group">
    <label>Pieces</label>
    <select id="piecesSelect">
      <option value="12">12 Pieces</option>
      <option value="24" selected>24 Pieces</option>
      <option value="36">36 Pieces</option>
      <option value="48">48 Pieces</option>
    </select>
  </div>
  <div class="ctrl-group">
    <button class="btn-primary" id="startBtn">▶ Start Puzzle</button>
    <button class="btn-hint" id="hintBtn" disabled>💡 Hint</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">Placed: <span id="statPlaced">0</span> / <span id="statTotal">0</span></div>
  <div class="stat-item">Moves: <span id="statMoves">0</span></div>
  <div class="stat-item">Time: <span id="statTime">0:00</span></div>
</div>

<div class="main-layout">
  <div class="puzzle-section">
    <div class="board-label">Puzzle Board</div>
    <div id="puzzleBoard">
      <div id="placeholder">
        <div class="placeholder-om">🪷</div>
        <div class="placeholder-text">Choose an image and pieces count<br>then press Start Puzzle</div>
      </div>
    </div>
    <div class="progress-wrap" style="width:min(600px,90vw)">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="tray-section">
    <div class="tray-label">Pieces</div>
    <div id="pieceTray"></div>
  </div>
</div>

<div id="completionOverlay">
  <div class="completion-box">
    <div class="completion-om">🪷</div>
    <div class="completion-title">Jai Shri Krishna!</div>
    <div class="completion-sub">Puzzle Complete</div>
    <div class="completion-stats">
      Pieces: <span id="cStatPieces"></span><br>
      Moves: <span id="cStatMoves"></span><br>
      Time: <span id="cStatTime"></span>
    </div>
    <button class="btn-primary" onclick="closeCompletion()" style="font-size:0.85rem;padding:10px 30px;">Play Again</button>
  </div>
</div>

<script>
// ── Image list & color parsing ──────────────────────────────
const BASE_URL = "https://sankalmuk.github.io/kids/Zigzaw/";

const IMAGES = [
  "FSKrishna061_2727284_16777215.jpg","FSKrishna081_4552018_16777215.jpg",
  "FSKrishna087_1773327_16777215.jpg","FSKrishna096_1988495_16777215.jpg",
  "FSKrishna098_3234743_16777215.jpg","FSKrishna108_4930313_16777215.jpg",
  "FSKrishna153_1249054_16777215.jpg","FSKrishna172_12050_16777215.jpg",
  "FSKrishna173_131329_16777215.jpg","FSKrishna190_14015193_0.jpg",
  "FSKrishna227_2833932_16777215.jpg","FSKrishna254_65911_16777215.jpg",
  "FSKrishna291_1640714_16777215.jpg","FSKrishna298_6451979_16777215.jpg",
  "FSKrishna301_2172691_16777215.jpg","K0003_1664603_16777215.jpg",
  "K0010_3232609_16777215.jpg","K0020_2784596_16777215.jpg",
  "K0029_4462610_16777215.jpg","K0031_6758145_16777215.jpg",
  "K0037_9008192_16777215.jpg","K0040_2695480_16777215.jpg",
  "K0048_5463902_16777215.jpg","K0058_5848118_16777215.jpg",
  "K0063_9323052_16777215.jpg","K0066_4414828_16777215.jpg",
  "K0072_749835_16777215.jpg","K0080_402527_16777215.jpg",
  "K0083_11552124_16777215.jpg","K0085_8283686_16777215.jpg",
  "K0087_1525873_16777215.jpg","K0088_155057_16777215.jpg",
  "K0103_1206628_16777215.jpg","K0104_10873849_0.jpg",
  "K0108_3287815_16777215.jpg","K0118_2700876_16777215.jpg",
  "K0124_604168_16777215.jpg","K0128_2563604_16777215.jpg",
  "K0129_3238220_16777215.jpg","K0132_2373221_16777215.jpg",
  "K0135_3422045_16777215.jpg","K0136_402541_16777215.jpg",
  "K0146_4610393_16777215.jpg","K0148_139863_16777215.jpg",
  "K0154_8436873_0.jpg","K0155_2633805_16777215.jpg",
  "K0163_1984130_16777215.jpg","K0179_2373937_16777215.jpg"
];

function vbColorToHex(vbInt) {
  // VB color: BGR order (not RGB)
  const b = (vbInt >> 16) & 0xff;
  const g = (vbInt >> 8) & 0xff;
  const r = vbInt & 0xff;
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function parseImageMeta(filename) {
  const name = filename.replace(/\.jpg$/i,'');
  const parts = name.split('_');
  const bg = parseInt(parts[parts.length-2]);
  const fg = parseInt(parts[parts.length-1]);
  return {
    bgColor: vbColorToHex(bg),
    fgColor: vbColorToHex(fg),
    label: parts.slice(0, parts.length-2).join('_')
  };
}

// ── Populate dropdown ────────────────────────────────────────
const sel = document.getElementById('imageSelect');
IMAGES.forEach(img => {
  const opt = document.createElement('option');
  opt.value = img;
  const meta = parseImageMeta(img);
  opt.textContent = meta.label;
  sel.appendChild(opt);
});

// ── Game state ───────────────────────────────────────────────
let state = {
  cols: 4, rows: 3,
  pieceW: 0, pieceH: 0,
  boardW: 0, boardH: 0,
  pieces: [],      // {id, col, row, placed, el, trayEl}
  placed: 0,
  moves: 0,
  startTime: null,
  timerInterval: null,
  hintsUsed: 0,
  bgColor: '#000000',
  image: null
};

// ── Board sizing ─────────────────────────────────────────────
function getBoardDimensions(cols, rows) {
  const maxW = Math.min(window.innerWidth - 260, 700);
  const maxH = window.innerHeight - 280;
  // Keep aspect ratio roughly 4:3 or match grid ratio
  let bw = maxW;
  let bh = Math.round(bw * (rows / cols));
  if (bh > maxH) { bh = maxH; bw = Math.round(bh * (cols / rows)); }
  // Snap to exact multiples
  bw = Math.floor(bw / cols) * cols;
  bh = Math.floor(bh / rows) * rows;
  return { boardW: bw, boardH: bh, pieceW: bw/cols, pieceH: bh/rows };
}

function getPiecesLayout(count) {
  // Return [cols, rows] for given piece count
  const options = {
    12: [4,3], 24: [6,4], 36: [6,6], 48: [8,6]
  };
  return options[count] || [4,3];
}

// ── Fisher-Yates shuffle ─────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Build puzzle ─────────────────────────────────────────────
let loadedImg = null;

function startPuzzle() {
  const filename = document.getElementById('imageSelect').value;
  if (!filename) { alert('Please choose an image first.'); return; }

  const piecesCount = parseInt(document.getElementById('piecesSelect').value);
  const [cols, rows] = getPiecesLayout(piecesCount);
  const meta = parseImageMeta(filename);

  // Clear old state
  clearTimer();
  state.pieces = [];
  state.placed = 0;
  state.moves = 0;
  state.hintsUsed = 0;
  state.bgColor = meta.bgColor;
  state.cols = cols;
  state.rows = rows;

  const dims = getBoardDimensions(cols, rows);
  Object.assign(state, dims);

  updateStats();
  document.getElementById('hintBtn').disabled = false;

  // Load image then render
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    loadedImg = img;
    renderPuzzle(img, filename);
  };
  img.onerror = () => {
    alert('Could not load image. Check network / CORS settings.');
  };
  img.src = BASE_URL + filename;
}

function renderPuzzle(img, filename) {
  const { cols, rows, boardW, boardH, pieceW, pieceH, bgColor } = state;

  // Board setup
  const board = document.getElementById('puzzleBoard');
  board.innerHTML = '';
  board.style.width = boardW + 'px';
  board.style.height = boardH + 'px';
  board.style.backgroundColor = '#000';

  // Ghost image background — draw full image at low opacity as guide
  const bgCanvas = document.createElement('canvas');
  bgCanvas.width = boardW;
  bgCanvas.height = boardH;
  const bgCtx = bgCanvas.getContext('2d');
  bgCtx.globalAlpha = 0.18;
  bgCtx.drawImage(img, 0, 0, boardW, boardH);
  bgCanvas.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;z-index:0;pointer-events:none;';
  board.appendChild(bgCanvas);

  // Draw slot markers
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const slot = document.createElement('div');
      slot.className = 'board-slot';
      slot.style.left = (c * pieceW) + 'px';
      slot.style.top = (r * pieceH) + 'px';
      slot.style.width = pieceW + 'px';
      slot.style.height = pieceH + 'px';
      slot.dataset.col = c;
      slot.dataset.row = r;
      board.appendChild(slot);
    }
  }

  // Create pieces
  const tray = document.getElementById('pieceTray');
  tray.innerHTML = '';
  state.pieces = [];

  const pieceIds = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      pieceIds.push({ col: c, row: r });

  shuffle(pieceIds);

  pieceIds.forEach(({col, row}, idx) => {
    const pieceObj = { id: idx, col, row, placed: false };

    // Create canvas for piece
    const canvas = document.createElement('canvas');
    canvas.width = pieceW;
    canvas.height = pieceH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, pieceW, pieceH);
    // Scale image to board size, then crop
    const scaleX = boardW / img.naturalWidth;
    const scaleY = boardH / img.naturalHeight;
    ctx.drawImage(img,
      col * pieceW / scaleX, row * pieceH / scaleY,
      pieceW / scaleX, pieceH / scaleY,
      0, 0, pieceW, pieceH
    );

    // Tray item
    const trayScale = Math.min(90 / pieceW, 70 / pieceH);
    const trayW = Math.round(pieceW * trayScale);
    const trayH = Math.round(pieceH * trayScale);

    const trayCanvas = document.createElement('canvas');
    trayCanvas.width = trayW;
    trayCanvas.height = trayH;
    const trayCtx = trayCanvas.getContext('2d');
    trayCtx.drawImage(canvas, 0, 0, trayW, trayH);
    trayCanvas.dataset.pieceId = idx;

    const trayWrap = document.createElement('div');
    trayWrap.className = 'tray-piece-wrap';
    trayWrap.style.width = trayW + 'px';
    trayWrap.style.height = trayH + 'px';
    trayWrap.appendChild(trayCanvas);
    tray.appendChild(trayWrap);

    pieceObj.trayEl = trayWrap;
    pieceObj.canvas = canvas; // full-res canvas

    // Full-size drag piece (created on board as invisible, shown when dragged)
    state.pieces.push(pieceObj);

    // Drag from tray
    makeDraggableFromTray(trayCanvas, pieceObj);
  });

  document.getElementById('statTotal').textContent = cols * rows;
  document.getElementById('progressBar').style.width = '0%';

  // Start timer
  state.startTime = Date.now();
  state.timerInterval = setInterval(updateTimer, 1000);
}

// ── Drag & Drop ──────────────────────────────────────────────
let dragging = null; // { pieceObj, el, offsetX, offsetY, fromTray }

function makeDraggableFromTray(trayCanvas, pieceObj) {
  trayCanvas.addEventListener('mousedown', e => startDragFromTray(e, pieceObj));
  trayCanvas.addEventListener('touchstart', e => startDragFromTray(e, pieceObj), { passive: false });
}

function startDragFromTray(e, pieceObj) {
  if (pieceObj.placed) return;
  e.preventDefault();

  const { pieceW, pieceH } = state;
  const board = document.getElementById('puzzleBoard');

  // Create floating drag element on board's parent
  const dragEl = document.createElement('canvas');
  dragEl.width = pieceW;
  dragEl.height = pieceH;
  const ctx = dragEl.getContext('2d');
  ctx.drawImage(pieceObj.canvas, 0, 0);
  dragEl.className = 'puzzle-piece dragging';
  dragEl.style.width = pieceW + 'px';
  dragEl.style.height = pieceH + 'px';
  document.body.appendChild(dragEl);

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  dragEl.style.left = (clientX - pieceW/2) + 'px';
  dragEl.style.top  = (clientY - pieceH/2) + 'px';

  dragging = {
    pieceObj,
    el: dragEl,
    offsetX: pieceW / 2,
    offsetY: pieceH / 2,
    fromTray: true
  };

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
}

function onDragMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  dragging.el.style.left = (clientX - dragging.offsetX) + 'px';
  dragging.el.style.top  = (clientY - dragging.offsetY) + 'px';

  // Highlight nearest slot
  highlightNearestSlot(clientX, clientY);
}

function highlightNearestSlot(clientX, clientY) {
  const board = document.getElementById('puzzleBoard');
  const rect = board.getBoundingClientRect();
  const slots = board.querySelectorAll('.board-slot');
  slots.forEach(s => s.classList.remove('hover-target'));

  const bx = clientX - rect.left;
  const by = clientY - rect.top;
  const { pieceW, pieceH, cols, rows } = state;
  const c = Math.floor(bx / pieceW);
  const r = Math.floor(by / pieceH);

  if (c >= 0 && c < cols && r >= 0 && r < rows) {
    const slot = board.querySelector(`.board-slot[data-col="${c}"][data-row="${r}"]`);
    if (slot && !slot.classList.contains('filled')) {
      slot.classList.add('hover-target');
    }
  }
}

function onDragEnd(e) {
  if (!dragging) return;
  const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

  const board = document.getElementById('puzzleBoard');
  const rect = board.getBoundingClientRect();
  const { pieceW, pieceH, cols, rows } = state;

  const bx = clientX - rect.left;
  const by = clientY - rect.top;

  const c = Math.floor(bx / pieceW);
  const r = Math.floor(by / pieceH);

  // Remove hover highlights
  board.querySelectorAll('.board-slot').forEach(s => s.classList.remove('hover-target'));

  if (c >= 0 && c < cols && r >= 0 && r < rows) {
    // Check if slot is free
    const slotFree = !state.pieces.some(p => p.placed && p.placedCol === c && p.placedRow === r);
    if (slotFree) {
      placePiece(dragging.pieceObj, c, r);
    }
  }

  dragging.el.remove();
  dragging = null;

  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
}

function placePiece(pieceObj, col, row) {
  const { pieceW, pieceH } = state;
  const board = document.getElementById('puzzleBoard');

  state.moves++;
  updateStats();

  // Create placed canvas on board
  const placedCanvas = document.createElement('canvas');
  placedCanvas.width = pieceW;
  placedCanvas.height = pieceH;
  const ctx = placedCanvas.getContext('2d');
  ctx.drawImage(pieceObj.canvas, 0, 0);
  placedCanvas.className = 'puzzle-piece placed';
  placedCanvas.style.width = pieceW + 'px';
  placedCanvas.style.height = pieceH + 'px';
  placedCanvas.style.left = (col * pieceW) + 'px';
  placedCanvas.style.top  = (row * pieceH) + 'px';
  board.appendChild(placedCanvas);

  // Mark slot as filled
  const slot = board.querySelector(`.board-slot[data-col="${col}"][data-row="${row}"]`);
  if (slot) slot.classList.add('filled');

  // Correct placement?
  const correct = (col === pieceObj.col && row === pieceObj.row);
  if (correct) {
    placedCanvas.style.boxShadow = '0 0 10px rgba(76,175,144,0.6)';
    placedCanvas.style.zIndex = '4';
  } else {
    placedCanvas.style.boxShadow = '0 0 8px rgba(200,80,80,0.4)';
    // Make it removable by clicking
    placedCanvas.style.cursor = 'pointer';
    placedCanvas.classList.remove('placed');
    placedCanvas.addEventListener('click', () => {
      // Return to tray
      placedCanvas.remove();
      if (slot) slot.classList.remove('filled');
      pieceObj.placed = false;
      pieceObj.trayEl.style.display = '';
    });
  }

  pieceObj.placed = true;
  pieceObj.placedCol = col;
  pieceObj.placedRow = row;
  pieceObj.correct = correct;
  pieceObj.trayEl.style.display = 'none';
  pieceObj.boardEl = placedCanvas;

  if (correct) {
    state.placed++;
    const pct = (state.placed / (state.cols * state.rows)) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('statPlaced').textContent = state.placed;

    if (state.placed === state.cols * state.rows) {
      setTimeout(showCompletion, 600);
    }
  }
}

// ── Hint ─────────────────────────────────────────────────────
document.getElementById('hintBtn').addEventListener('click', () => {
  // Find a random unplaced piece and flash it, plus flash its target slot
  const unplaced = state.pieces.filter(p => !p.placed);
  if (!unplaced.length) return;
  const pick = unplaced[Math.floor(Math.random() * unplaced.length)];
  state.hintsUsed++;

  // Flash tray item
  pick.trayEl.style.transition = 'box-shadow 0.2s';
  pick.trayEl.style.boxShadow = '0 0 0 3px var(--gold-light)';
  setTimeout(() => { pick.trayEl.style.boxShadow = ''; }, 1000);

  // Flash target slot on board
  const board = document.getElementById('puzzleBoard');
  const slot = board.querySelector(`.board-slot[data-col="${pick.col}"][data-row="${pick.row}"]`);
  if (slot) {
    slot.style.background = 'rgba(200,160,60,0.3)';
    slot.style.borderColor = 'var(--gold)';
    setTimeout(() => {
      slot.style.background = '';
      slot.style.borderColor = '';
    }, 1000);
  }
});

// ── Stats & Timer ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('statMoves').textContent = state.moves;
  document.getElementById('statPlaced').textContent = state.placed;
}

function updateTimer() {
  if (!state.startTime) return;
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('statTime').textContent = m + ':' + String(s).padStart(2,'0');
}

function clearTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  document.getElementById('statTime').textContent = '0:00';
}

// ── Completion ───────────────────────────────────────────────
function showCompletion() {
  clearTimer();
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('cStatPieces').textContent = state.cols * state.rows;
  document.getElementById('cStatMoves').textContent = state.moves;
  document.getElementById('cStatTime').textContent = m + ':' + String(s).padStart(2,'0');
  document.getElementById('completionOverlay').classList.add('show');
}

function closeCompletion() {
  document.getElementById('completionOverlay').classList.remove('show');
}

// ── Wire buttons ─────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startPuzzle);
</script>
</body>
